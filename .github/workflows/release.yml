name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '23'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: node --test "dist-electron/src/**/*.test.js"

      - name: Build macOS artifacts
        run: npm run dist:mac:ci

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-release
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '23'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: node --test "dist-electron/src/**/*.test.js"

      - name: Build Windows artifacts
        run: npm run dist:win:ci

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: win-release
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml

  release:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: '*-release'
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No packaged assets were downloaded."
            exit 1
          fi

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber --repo "$GH_REPO"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes --draft --target "$GITHUB_SHA" --repo "$GH_REPO"
            exit 0
          fi

          gh release create "$TAG_NAME" "${files[@]}" --title "$TAG_NAME" --generate-notes --repo "$GH_REPO"
